<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tailhopper - Error</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/ui.css">
</head>
<body class="loading-page">
  <h1>Tailhopper</h1>
  <div class="hopper-container">
    <svg class="hopper" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#E57373;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
        </linearGradient>
      </defs>
      
      <!-- Tail -->
      <path d="M 50 85 Q 55 100 50 115" stroke="#EF9A9A" stroke-width="4" fill="none" stroke-linecap="round" />
      
      <!-- Main body (rounded) -->
      <ellipse cx="50" cy="55" rx="22" ry="28" fill="url(#bodyGrad)" />
      
      <!-- Head -->
      <circle cx="50" cy="25" r="18" fill="#EF9A9A" />
      
      <!-- Left eye -->
      <circle cx="40" cy="20" r="5" fill="#fff" />
      <circle cx="40" cy="20" r="3" fill="#C62828" />
      <circle cx="41" cy="19" r="1" fill="#fff" />
      
      <!-- Right eye -->
      <circle cx="60" cy="20" r="5" fill="#fff" />
      <circle cx="60" cy="20" r="3" fill="#C62828" />
      <circle cx="61" cy="19" r="1" fill="#fff" />
      
      <!-- Sad face -->
      <path d="M 45 30 Q 50 26 55 30" stroke="#C62828" stroke-width="1.5" fill="none" stroke-linecap="round" />
      
      <!-- Left antenna -->
      <path d="M 38 10 Q 28 5 25 2" stroke="#C62828" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <circle cx="25" cy="2" r="2" fill="#C62828" />
      
      <!-- Right antenna -->
      <path d="M 62 10 Q 72 5 75 2" stroke="#C62828" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <circle cx="75" cy="2" r="2" fill="#C62828" />
      
      <!-- Belly patch -->
      <ellipse cx="50" cy="60" rx="14" ry="18" fill="#FFCDD2" opacity="0.4" />
      
      <!-- Front legs -->
      <g class="legs">
        <ellipse cx="32" cy="70" rx="3" ry="14" fill="#C62828" transform="rotate(-25 32 70)" />
        <ellipse cx="68" cy="70" rx="3" ry="14" fill="#C62828" transform="rotate(25 68 70)" />
      </g>
      
      <!-- Back legs -->
      <g class="back-legs">
        <ellipse cx="28" cy="82" rx="3" ry="16" fill="#C62828" transform="rotate(-35 28 82)" />
        <ellipse cx="72" cy="82" rx="3" ry="16" fill="#C62828" transform="rotate(35 72 82)" />
      </g>
    </svg>
  </div>
  <p class="loading-text">Connection Error</p>
  <p class="loading-subtext error-message">{{.Error}}</p>
  <p class="loading-subtext">Please restart the application.</p>
</body>
</html>
