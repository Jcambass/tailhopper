<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="5">
  <title>Tailhopper - Connecting...</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/ui.css">
</head>
<body class="loading-page">
  <h1>Tailhopper</h1>
  <div class="hopper-container">
    <svg class="hopper" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#558B2F;stop-opacity:1" />
        </linearGradient>
      </defs>
      
      <!-- Tail -->
      <path d="M 50 85 Q 55 100 50 115" stroke="#9CCC65" stroke-width="4" fill="none" stroke-linecap="round" />
      
      <!-- Main body (rounded) -->
      <ellipse cx="50" cy="55" rx="22" ry="28" fill="url(#bodyGrad)" />
      
      <!-- Head -->
      <circle cx="50" cy="25" r="18" fill="#9CCC65" />
      
      <!-- Left eye -->
      <circle cx="40" cy="20" r="5" fill="#fff" />
      <circle cx="40" cy="20" r="3" fill="#2E7D32" />
      <circle cx="41" cy="19" r="1" fill="#fff" />
      
      <!-- Right eye -->
      <circle cx="60" cy="20" r="5" fill="#fff" />
      <circle cx="60" cy="20" r="3" fill="#2E7D32" />
      <circle cx="61" cy="19" r="1" fill="#fff" />
      
      <!-- Smile -->
      <path d="M 45 28 Q 50 32 55 28" stroke="#558B2F" stroke-width="1.5" fill="none" stroke-linecap="round" />
      
      <!-- Left antenna -->
      <path d="M 38 10 Q 28 5 25 2" stroke="#558B2F" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <circle cx="25" cy="2" r="2" fill="#558B2F" />
      
      <!-- Right antenna -->
      <path d="M 62 10 Q 72 5 75 2" stroke="#558B2F" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <circle cx="75" cy="2" r="2" fill="#558B2F" />
      
      <!-- Belly patch -->
      <ellipse cx="50" cy="60" rx="14" ry="18" fill="#AED581" opacity="0.4" />
      
      <!-- Front legs (stationary) -->
      <g class="legs">
        <ellipse cx="32" cy="70" rx="3" ry="14" fill="#558B2F" rx="3" ry="14" transform="rotate(-25 32 70)" />
        <ellipse cx="68" cy="70" rx="3" ry="14" fill="#558B2F" rx="3" ry="14" transform="rotate(25 68 70)" />
      </g>
      
      <!-- Back legs (jump) -->
      <g class="back-legs">
        <ellipse cx="28" cy="78" rx="3" ry="16" fill="#558B2F" transform="rotate(-35 28 78)" />
        <ellipse cx="72" cy="78" rx="3" ry="16" fill="#558B2F" transform="rotate(35 72 78)" />
      </g>
    </svg>
  </div>
  <p class="message">
    Connecting to <span class="tailnet-tag">{{.BaseDomain}}</span> ...
  </p>
  <p class="loading-note">
    <span class="loading-note-text">This page will refresh automatically</span>
  </p>
</body>
</html>
