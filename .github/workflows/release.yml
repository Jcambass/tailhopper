name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser release
        if: github.event_name != 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser snapshot (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Bump Homebrew formula
    if: github.event_name != 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: tailhopper
          formula-path: Formula/tailhopper.rb
          homebrew-tap: jcambass/homebrew-tap
          base-branch: main
          create-pullrequest: true
          create-branch: true
          tag-name: ${{ github.ref_name }}
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_PR_WRITER }}

      - name: Add pr-pull label to tap PR
        env:
          GH_TOKEN: ${{ secrets.TAP_PR_WRITER }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"

          # Ensure the label exists in the tap repository.
          gh label create pr-pull \
            --repo jcambass/homebrew-tap \
            --color 0E8A16 \
            --description "Homebrew formula update ready for pr-pull" \
            || true

          pr_number=""
          for attempt in {1..10}; do
            pr_number="$(gh pr list \
              --repo jcambass/homebrew-tap \
              --state open \
              --search "tailhopper ${version} in:title" \
              --json number,createdAt \
              --jq 'sort_by(.createdAt) | reverse | .[0].number')"

            if [[ -n "${pr_number}" && "${pr_number}" != "null" ]]; then
              break
            fi

            echo "Tap PR not found yet (attempt ${attempt}/10). Retrying in 6s..."
            sleep 6
          done

          if [[ -z "${pr_number}" || "${pr_number}" == "null" ]]; then
            echo "Could not find the Homebrew tap PR for tag ${TAG_NAME} after retries." >&2
            echo "Please manually apply the 'pr-pull' label to the tap PR once it appears." >&2
            exit 1
          fi

          gh pr edit "${pr_number}" --repo jcambass/homebrew-tap --add-label pr-pull
