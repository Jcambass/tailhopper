name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: Which release task to run
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - homebrew
      tag-name:
        description: Release tag to use when mode=homebrew (for example v0.1.0)
        required: false
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser release
        if: github.event_name != 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser snapshot (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'snapshot'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Bump Homebrew formula
    if: |
      (github.event_name != 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'homebrew' && startsWith(github.event.inputs.tag-name, 'v') && !contains(github.event.inputs.tag-name, '-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: tailhopper
          formula-path: Formula/tailhopper.rb
          homebrew-tap: jcambass/homebrew-tap
          base-branch: main
          create-pullrequest: true
          create-branch: true
          tag-name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag-name || github.ref_name }}
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_PR_WRITER }}