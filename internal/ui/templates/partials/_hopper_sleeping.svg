{{define "_hopper_sleeping"}}
<svg class="hopper-small sleeping" viewBox="-10 -10 120 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bodyGradGray" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#BDBDBD;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#9E9E9E;stop-opacity:1" />
      </linearGradient>
    </defs>
    <g transform="rotate(-80 50 55) translate(-2 0)">
      <path d="M 50 85 Q 55 100 50 115" stroke="#CFCFCF" stroke-width="4" fill="none" stroke-linecap="round" />
      <ellipse cx="50" cy="55" rx="22" ry="28" fill="url(#bodyGradGray)" />
      <circle cx="50" cy="25" r="18" fill="#CFCFCF" />
      <!-- Closed eyes + sleepy smile -->
      <path d="M 34 21 Q 40 19 46 21" stroke="#616161" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M 54 21 Q 60 19 66 21" stroke="#616161" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M 44 30 Q 50 34 56 30" stroke="#616161" stroke-width="1.5" fill="none" stroke-linecap="round" />
      <circle cx="36" cy="26" r="2" fill="#DFAAAA" opacity="0.6" />
      <circle cx="64" cy="26" r="2" fill="#DFAAAA" opacity="0.6" />
      <path d="M 38 10 Q 28 5 25 2" stroke="#757575" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <circle cx="25" cy="2" r="2" fill="#757575" />
      <path d="M 62 10 Q 72 5 75 2" stroke="#757575" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <circle cx="75" cy="2" r="2" fill="#757575" />
      <ellipse cx="50" cy="60" rx="14" ry="18" fill="#E0E0E0" opacity="0.4" />
      <g class="legs">
        <ellipse cx="32" cy="70" rx="3" ry="14" fill="#757575" transform="rotate(-25 32 70)" />
        <ellipse cx="68" cy="70" rx="3" ry="14" fill="#757575" transform="rotate(25 68 70)" />
      </g>
      <g class="back-legs">
        <ellipse cx="28" cy="78" rx="3" ry="16" fill="#757575" transform="rotate(-35 28 78)" />
        <ellipse cx="72" cy="78" rx="3" ry="16" fill="#757575" transform="rotate(35 72 78)" />
      </g>
    </g>
    <!-- Sleep Zs -->
    <text x="10" y="8" font-size="8" fill="#B0B0B0" font-family="sans-serif">Z</text>
    <text x="18" y="16" font-size="6" fill="#C0C0C0" font-family="sans-serif">z</text>
</svg>
{{end}}
