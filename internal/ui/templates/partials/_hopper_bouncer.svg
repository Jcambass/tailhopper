{{define "_hopper_bouncer"}}
<svg class="hopper-small bouncer" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bodyGradBlueBouncer" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
      </linearGradient>
    </defs>
    <path d="M 50 85 Q 55 100 50 115" stroke="#64B5F6" stroke-width="4" fill="none" stroke-linecap="round" />
    <ellipse cx="50" cy="55" rx="22" ry="28" fill="url(#bodyGradBlueBouncer)" />
    <circle cx="50" cy="25" r="18" fill="#64B5F6" />
    
    <!-- Sunglasses -->
    <rect x="33" y="20" width="13" height="8" rx="2" fill="#1A1A1A" />
    <rect x="54" y="20" width="13" height="8" rx="2" fill="#1A1A1A" />
    <line x1="46" y1="24" x2="54" y2="24" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />
    <line x1="33" y1="24" x2="28" y2="23" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" />
    <line x1="67" y1="24" x2="72" y2="23" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Stern frown -->
    <path d="M 43 32 Q 50 30 57 32" stroke="#1565C0" stroke-width="2" fill="none" stroke-linecap="round" />
    
    <!-- Antennae - more stiff/straight for stern look -->
    <path d="M 35 10 L 25 2" stroke="#1565C0" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <circle cx="25" cy="2" r="2" fill="#1565C0" />
    <path d="M 65 10 L 75 2" stroke="#1565C0" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <circle cx="75" cy="2" r="2" fill="#1565C0" />
    
    <!-- Crossed arms -->
    <path d="M 30 50 Q 35 55 45 52" stroke="#1565C0" stroke-width="3" fill="none" stroke-linecap="round" />
    <path d="M 70 50 Q 65 55 55 52" stroke="#1565C0" stroke-width="3" fill="none" stroke-linecap="round" />
    
    <!-- Body highlight -->
    <ellipse cx="50" cy="60" rx="14" ry="18" fill="#90CAF9" opacity="0.4" />
    
    <!-- Legs - wider stance for authoritative posture -->
    <g class="legs">
      <ellipse cx="32" cy="70" rx="3" ry="14" fill="#1565C0" transform="rotate(-25 32 70)" />
      <ellipse cx="68" cy="70" rx="3" ry="14" fill="#1565C0" transform="rotate(25 68 70)" />
    </g>
    <g class="back-legs">
      <ellipse cx="28" cy="78" rx="3" ry="16" fill="#1565C0" transform="rotate(-35 28 78)" />
      <ellipse cx="72" cy="78" rx="3" ry="16" fill="#1565C0" transform="rotate(35 72 78)" />
    </g>
</svg>
{{end}}
