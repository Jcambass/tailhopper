{{define "socks_panel"}}
  <div class="tailnet-socks" id="connected-socks-panel-{{.ID}}" hx-preserve>
    <div class="tailnet-section-header">
      <div class="tailnet-section-title">SOCKS5 Proxy</div>
    </div>
    <div class="tailnet-socks-row">
      <div class="tailnet-socks-item">
        <div class="tailnet-socks-label">Host</div>
        <div class="tailnet-socks-value">
          <code id="socks-host-{{.ID}}">{{.SocksHost}}</code>
          <button class="copy-btn" onclick="copyToClipboard('socks-host-{{.ID}}')" title="Copy to clipboard">
            <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
      <div class="tailnet-socks-item">
        <div class="tailnet-socks-label">Port</div>
        <div class="tailnet-socks-value">
          <code id="socks-port-{{.ID}}">{{.SocksPort}}</code>
          <button class="copy-btn" onclick="copyToClipboard('socks-port-{{.ID}}')" title="Copy to clipboard">
            <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="tailnet-socks-item" style="margin-top: 8px;">
      <div class="tailnet-socks-label">Curl Example</div>
      <div class="tailnet-socks-value">
        <code id="socks-curl-{{.ID}}">curl --socks5-hostname {{.SocksAddr}}</code>
        <button class="copy-btn" onclick="copyToClipboard('socks-curl-{{.ID}}')" title="Copy to clipboard">
          <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
    </div>
  </div>
{{end}}
