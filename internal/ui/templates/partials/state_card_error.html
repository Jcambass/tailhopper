{{define "state_card_error"}}
  <!-- Error State Card -->
  <div class="state-body">
    <div class="hopper-small-container" hx-preserve>
      {{template "_hopper_red" .}}
    </div>
    <p class="state-message">Connection error</p>
    <p class="state-error-details">{{.ErrorMsg}}</p>
    <p class="state-note">Please check your network connection and try restarting Tailhopper.</p>
  </div>
{{end}}
