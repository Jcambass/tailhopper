<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558B2F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Body (top portion visible, scaled up to match head) -->
  <ellipse cx="32" cy="60" rx="16" ry="14" fill="url(#bodyGrad)" />
  
  <!-- Belly patch -->
  <ellipse cx="32" cy="60" rx="10" ry="10" fill="#AED581" opacity="0.4" />
  
  <!-- Head (larger) -->
  <circle cx="32" cy="34" r="20" fill="#9CCC65" />
  
  <!-- Left eye -->
  <circle cx="24" cy="30" r="5" fill="#fff" />
  <circle cx="24" cy="30" r="3" fill="#2E7D32" />
  <circle cx="25" cy="29" r="1" fill="#fff" />
  
  <!-- Right eye -->
  <circle cx="40" cy="30" r="5" fill="#fff" />
  <circle cx="40" cy="30" r="3" fill="#2E7D32" />
  <circle cx="41" cy="29" r="1" fill="#fff" />
  
  <!-- Smile -->
  <path d="M 26 40 Q 32 45 38 40" stroke="#558B2F" stroke-width="2" fill="none" stroke-linecap="round" />
  
  <!-- Left antenna -->
  <path d="M 18 18 Q 10 10 6 6" stroke="#558B2F" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <circle cx="6" cy="6" r="2.5" fill="#558B2F" />
  
  <!-- Right antenna -->
  <path d="M 46 18 Q 54 10 58 6" stroke="#558B2F" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <circle cx="58" cy="6" r="2.5" fill="#558B2F" />
</svg>
